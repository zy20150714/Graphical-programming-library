<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应用UI空壳框架 - 图形化编程素材库</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/common.css">
<style>
:root {
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
}
body {
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
h1, h2, h3 { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
}
.topbar-inner {
  max-width: 1440px; margin: 0 auto; padding: 0 24px;
}
.topbar-header {
  display: flex; align-items: center; justify-content: space-between; padding: 14px 0;
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
}
.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-secondary);
  text-decoration: none; border: 1px solid var(--border-subtle);
  transition: all var(--transition-fast);
  background: var(--bg-input);
}
.back-link:hover { border-color: var(--accent); color: var(--text-primary); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }

.theme-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s ease; padding: 0;
}
.theme-btn:hover { transform: scale(1.15); }
.theme-btn.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

.main-content { max-width: 1440px; margin: 0 auto; padding: 24px; }

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.section-title { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.section-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

.search-box {
  position: relative; width: 220px;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-input); color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--accent); }
.search-box .s-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}

.batch-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 18px;
  animation: slideDown 0.3s ease;
}
.batch-bar.hidden { display: none; }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.batch-count {
  background: var(--accent); color: white;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
}

.filter-tabs {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-tab {
  padding: 7px 16px; border-radius: var(--radius-xl);
  font-size: 13px; cursor: pointer;
  border: 1px solid var(--border-subtle);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition-fast);
  user-select: none; font-family: inherit;
}
.filter-tab:hover { border-color: var(--accent); color: var(--text-primary); }
.filter-tab.active {
  background: var(--accent); color: white;
  border-color: var(--accent); box-shadow: 0 0 14px var(--accent-glow);
}

.component-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}
.comp-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-normal);
  position: relative;
  cursor: pointer;
}
.comp-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.comp-card.selected {
  border-color: var(--accent-secondary);
  box-shadow: 0 0 20px var(--accent-glow);
}
.comp-card-check {
  position: absolute; top: 12px; left: 12px; z-index: 5;
  width: 20px; height: 20px;
  accent-color: var(--accent-secondary);
  cursor: pointer;
}
.comp-card-preview {
  width: 100%; height: 260px;
  background: var(--bg-secondary);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.comp-card-preview canvas {
  display: block;
  max-width: 100%; max-height: 100%;
  border-radius: 4px;
}
.comp-card-info { padding: 12px 16px; }
.comp-card-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.comp-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.comp-card-actions .btn {
  padding: 5px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border-subtle);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition-fast);
  font-family: inherit;
}
.comp-card-actions .btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent); }
.comp-card-actions .btn-primary-s {
  background: var(--accent); border-color: var(--accent); color: white;
}
.comp-card-actions .btn-primary-s:hover { box-shadow: 0 0 12px var(--accent-glow); }

.comp-card-dim {
  position: absolute; top: 12px; right: 12px;
  font-family: 'Space Grotesk', monospace;
  font-size: 11px; color: var(--text-muted);
  background: var(--bg-input);
  padding: 2px 8px; border-radius: 6px;
  border: 1px solid var(--border-subtle);
}

.modal-preview {
  max-width: 90vw; max-height: 90vh;
}
.modal-preview canvas {
  width: 100%; height: auto;
  border-radius: 8px;
}

@media (max-width: 900px) {
  .component-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
}
@media (max-width: 640px) {
  .main-content { padding: 16px; }
  .component-grid { grid-template-columns: 1fr; }
  .topbar-inner { padding: 0 12px; }
  .section-header { flex-direction: column; align-items: flex-start; }
  .search-box { width: 100%; }
}
</style>
</head>
<body>

<div class="bg-glow bg-glow--tl"></div>
<div class="bg-glow bg-glow--br"></div>

<div class="progress-track" id="progressBar" style="width:0%"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-header">
      <div class="logo-area">
        <div class="logo-icon">&#9673;</div>
        <span class="logo-text">空壳框架素材库</span>
      </div>

        <button class="theme-btn" data-theme-btn="dark-tech" onclick="__theme.switch('dark-tech')" style="background:#0a0a0f;border-color:#6366f1;"></button>
        <button class="theme-btn" data-theme-btn="light-clean" onclick="__theme.switch('light-clean')" style="background:#f8f9fa;border-color:#2563eb;"></button>
        <button class="theme-btn" data-theme-btn="kids-color" onclick="__theme.switch('kids-color')" style="background:#fff8e7;border-color:#ff6b6b;"></button>
      </div>
    </div>
  </div>
</header>

<main class="main-content">
  <div class="section-header">
    <div>
      <h2 class="section-title">应用UI空壳框架</h2>
      <p class="section-subtitle">30个应用界面空壳框架，6大分类，只有轮廓占位，方便叠加自定义素材，支持 PNG/JPG/SVG 导出</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="search-box">
        <span class="s-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="搜索框架..." autocomplete="off">
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" style="accent-color:var(--accent-secondary);"> 全选
      </label>
    </div>
  </div>

  <div class="batch-bar hidden" id="batchBar">
    <span class="batch-count" id="batchCount">0</span>
    <span style="font-size:13px;color:var(--text-secondary);">已选择</span>
    <button class="btn-primary" onclick="batchDownload()" style="padding:6px 16px;font-size:13px;">批量下载 (ZIP)</button>
    <button class="btn-secondary" onclick="clearSelection()" style="padding:6px 16px;font-size:13px;">取消选择</button>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <div class="filter-tab active" data-cat="all" onclick="filterBy('all')">全部</div>
    <div class="filter-tab" data-cat="basic" onclick="filterBy('basic')">基础应用</div>
    <div class="filter-tab" data-cat="content" onclick="filterBy('content')">内容应用</div>
    <div class="filter-tab" data-cat="social" onclick="filterBy('social')">社交应用</div>
    <div class="filter-tab" data-cat="tool" onclick="filterBy('tool')">工具应用</div>
    <div class="filter-tab" data-cat="business" onclick="filterBy('business')">商务应用</div>
    <div class="filter-tab" data-cat="creative" onclick="filterBy('creative')">创意应用</div>
  </div>

  <div class="component-grid" id="assetGrid"></div>
</main>

<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal(event)">
  <div class="modal-panel modal-preview" id="modalPanel" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:18px;font-weight:600;" id="modalTitle"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;">&times;</button>

    <div id="modalContent" style="display:flex;justify-content:center;"></div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;" id="modalActions"></div>
  </div>
</div>

<script>
var fontsLoaded = false;
var currentFilter = 'all';
var selection = new Set();
var ctxMenuTarget = -1;

var FF = "'Noto Sans SC', 'Space Grotesk', sans-serif";
var FM = "'Space Grotesk', 'Noto Sans SC', sans-serif";

function getFont() { return fontsLoaded ? FF : 'sans-serif'; }
function getMonoFont() { return fontsLoaded ? FM : 'sans-serif'; }

function cssVar(name, fallback) {
  try {
    var val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return val || fallback;
  } catch(e) { return fallback; }
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function svgRect(x, y, w, h, r, fill, stroke, sw) {
  var rx = r != null ? ' rx="' + r + '" ry="' + r + '"' : '';
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '"' + rx + ' fill="' + fill + '"' + s + swA + '/>';
}
function svgCircle(cx, cy, r, fill, stroke, sw) {
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + fill + '"' + s + swA + '/>';
}
function svgText(x, y, text, fill, fontSize, align, bold) {
  var a = align ? ' text-anchor="' + align + '"' : '';
  var fw = bold ? ' font-weight="bold"' : '';
  return '<text x="' + x + '" y="' + y + '"' + a + ' font-family="' + getFont() + '" font-size="' + fontSize + '" fill="' + fill + '"' + fw + '>' + text + '</text>';
}
function svgPath(d, fill, stroke, sw) {
  var f = fill ? ' fill="' + fill + '"' : ' fill="none"';
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<path d="' + d + '"' + f + s + swA + '/>';
}
function svgLine(x1, y1, x2, y2, stroke, sw) {
  return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + stroke + '" stroke-width="' + (sw || 1) + '"/>';
}
function svgWrap(w, h, defs, content) {
  var d = defs ? '<defs>' + defs + '</defs>' : '';
  return '<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' + d + content + '\n</svg>';
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawDashedRect(ctx, x, y, w, h, r, stroke, sw) {
  ctx.save();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = sw || 1;
  ctx.setLineDash([4, 4]);
  roundRect(ctx, x, y, w, h, r);
  ctx.stroke();
  ctx.restore();
}

function drawHLine(ctx, x, y, len, stroke, sw) {
  ctx.save();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = sw || 1;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + len, y);
  ctx.stroke();
  ctx.restore();
}

function drawVLine(ctx, x, y, len, stroke, sw) {
  ctx.save();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = sw || 1;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + len);
  ctx.stroke();
  ctx.restore();
}

function drawGrid(ctx, x, y, w, h, cols, rows, stroke, sw) {
  ctx.save();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = sw || 1;
  var cw = w / cols, rh = h / rows;
  for (var ci = 0; ci <= cols; ci++) {
    var cx = x + ci * cw;
    ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx, y + h); ctx.stroke();
  }
  for (var ri = 0; ri <= rows; ri++) {
    var ry = y + ri * rh;
    ctx.beginPath(); ctx.moveTo(x, ry); ctx.lineTo(x + w, ry); ctx.stroke();
  }
  ctx.restore();
}

/* ================================================================
   Category 1: 基础应用 (Basic Apps) 1-5
   ================================================================ */

/* 1. Calculator Shell */
function renderCalculatorShell(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  var bg = cssVar('--bg-secondary', '#12121a');
  var card = cssVar('--bg-card', '#1a1a2e');
  var border = cssVar('--border-subtle', 'rgba(255,255,255,0.06)');
  var accent = cssVar('--accent', '#6366f1');
  var pad = 20, bodyW = w - pad * 2, bodyX = pad;
  ctx.fillStyle = card;
  roundRect(ctx, bodyX, 10, bodyW, h - 20, 20);
  ctx.fill();
  ctx.strokeStyle = border;
  ctx.lineWidth = 1;
  roundRect(ctx, bodyX, 10, bodyW, h - 20, 20);
  ctx.stroke();
  var dW = bodyW - 24, dH = 70, dX = bodyX + 12, dY = 28;
  ctx.fillStyle = bg;
  roundRect(ctx, dX, dY, dW, dH, 12);
  ctx.fill();
  var rows = 5, cols = 4;
  var gap = 8, kPadX = 16, kPadY = 40;
  var kAreaW = bodyW - kPadX * 2;
  var kAreaH = h - (dY + dH + 34) - kPadY - 16;
  var kW = (kAreaW - (cols - 1) * gap) / cols;
  var kH = (kAreaH - (rows - 1) * gap) / rows;
  var kAreaX = bodyX + kPadX;
  var kAreaY = dY + dH + 34;
  for (var ri = 0; ri < rows; ri++) {
    for (var ci = 0; ci < cols; ci++) {
      var kx = kAreaX + ci * (kW + gap);
      var ky = kAreaY + ri * (kH + gap);
      var isOp = ri > 0 && ci === 3;
      var isEq = ri === 4 && ci === 2;
      var isZero = ri === 4 && ci === 0;
      var w2 = isZero ? kW * 2 + gap : kW;
      if (isOp || isEq) {
        ctx.fillStyle = accent;
        roundRect(ctx, kx, ky, w2, kH, 10);
        ctx.fill();
      } else {
        ctx.fillStyle = bg;
        roundRect(ctx, kx, ky, w2, kH, 10);
        ctx.fill();
      }
    }
  }
}
function genCalculatorShellSvg(w, h) {
  var c = svgRect(20, 10, w - 40, h - 20, 20, '#1a1a2e', 'rgba(255,255,255,0.06)', 1);
  c += svgRect(32, 28, w - 64, 70, 12, '#12121a');
  var rows = 5, cols = 4, gap = 8, kX = 36, kY = 120, kW = 74, kH = 56;
  for (var ri = 0; ri < rows; ri++) {
    for (var ci = 0; ci < cols; ci++) {
      var kx = kX + ci * (kW + gap);
      var ky = kY + ri * (kH + gap);
      var isOp = ri > 0 && ci === 3;
      var isEq = ri === 4 && ci === 2;
      var isZero = ri === 4 && ci === 0;
      var w2 = isZero ? kW * 2 + gap : kW;
      var fill = (isOp || isEq) ? '#6366f1' : '#12121a';
      c += svgRect(kx, ky, w2, kH, 10, fill);
    }
  }
  return svgWrap(w, h, '', c);
}

/* 2. Clock Shell */
function renderClockShell(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  var bg = cssVar('--bg-secondary', '#12121a');
  var card = cssVar('--bg-card', '#1a1a2e');
  var border = cssVar('--border-subtle', 'rgba(255,255,255,0.06)');
  var accent = cssVar('--accent', '#6366f1');
  var textM = cssVar('--text-muted', '#555566');
  ctx.fillStyle = card;
  roundRect(ctx, 10, 10, w - 20, h - 20, 20);
  ctx.fill();
  ctx.strokeStyle = border;
  ctx.lineWidth = 1;
  roundRect(ctx, 10, 10, w - 20, h - 20, 20);
  ctx.stroke();
  var cx = w / 2, cy = h * 0.42, r = Math.min(w, h) * 0.28;
  ctx.strokeStyle = border;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  for (var i = 0; i < 12; i++) {
    var ang = (i / 12) * Math.PI * 2 - Math.PI / 2;
    var x1 = cx + Math.cos(ang) * (r - 10);
    var y1 = cy + Math.sin(ang) * (r - 10);
    var x2 = cx + Math.cos(ang) * (r - 4);
    var y2 = cy + Math.sin(ang) * (r - 4);
    ctx.strokeStyle = textM;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + r * 0.5, cy - r * 0.2); ctx.stroke();
  ctx.strokeStyle = textM;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - r * 0.2, cy + r * 0.4); ctx.stroke();
  ctx.fillStyle = accent;
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
  drawHLine(ctx, cx - 40, h * 0.78, 80, border, 1);
  drawHLine(ctx, cx - 25, h * 0.78 + 14, 50, textM, 1);
}
function genClockShellSvg(w, h) {
  var c = svgRect(10, 10, w - 20, h - 20, 20, '#1a1a2e', 'rgba(255,255,255,0.06)', 1);
  var cx = w / 2, cy = h * 0.42, r = Math.min(w, h) * 0.28;

/* ================================================================
   Rendering Engine & Export Logic
   ================================================================ */

function renderAll() {
  var container = document.getElementById('assetGrid');
  var html = '';
  components.forEach(function(comp, idx) {
    if (currentFilter !== 'all' && comp.cat !== currentFilter) return;
    var selected = selection.has(idx) ? ' selected' : '';
    var checked = selection.has(idx) ? ' checked' : '';
    html += '<div class="comp-card' + selected + '" data-idx="' + idx + '" data-cat="' + comp.cat + '" data-name="' + comp.name + '" oncontextmenu="showCtxMenu(event, ' + idx + ')">';
    html += '<input type="checkbox" class="comp-card-check"' + checked + ' onchange="toggleItem(' + idx + ')" onclick="event.stopPropagation()">';
    html += '<span class="comp-card-dim">' + comp.w + 'x' + comp.h + '</span>';
    html += '<div class="comp-card-preview"><canvas id="preview-canvas-' + idx + '" width="' + comp.w + '" height="' + comp.h + '"></canvas></div>';
    html += '<div class="comp-card-info"><div class="comp-card-name">' + comp.name + '</div>';
    html += '<div class="comp-card-actions">';
    html += '<button class="btn btn-primary-s" onclick="event.stopPropagation();previewItem(' + idx + ')">预览</button>';
    html += '<button class="btn" onclick="event.stopPropagation();downloadPng(' + idx + ')">PNG</button>';
    html += '<button class="btn" onclick="event.stopPropagation();downloadJpg(' + idx + ')">JPG</button>';
    html += '<button class="btn" onclick="event.stopPropagation();downloadSvg(' + idx + ')">SVG</button>';
    html += '</div></div></div>';
  });
  container.innerHTML = html;
  components.forEach(function(comp, idx) {
    if (currentFilter !== 'all' && comp.cat !== currentFilter) return;
    var canvas = document.getElementById('preview-canvas-' + idx);
    if (canvas) {
      comp.render(canvas.getContext('2d'), comp.w, comp.h);
    }
  });
}

function previewItem(idx) {
  var comp = components[idx];
  document.getElementById('modalTitle').textContent = comp.name;
  var container = document.getElementById('modalContent');
  container.innerHTML = '';
  var c = document.createElement('canvas');
  c.width = comp.w;
  c.height = comp.h;
  c.style.maxWidth = '100%';
  c.style.maxHeight = '70vh';
  c.style.borderRadius = '8px';
  comp.render(c.getContext('2d'), comp.w, comp.h);
  container.appendChild(c);
  var actions = document.getElementById('modalActions');
  actions.innerHTML = '';
  var btns = [
    { label: 'PNG (透明)', fn: function() { __export.exportPngTransparent(c, comp.name); } },
    { label: 'PNG (白底)', fn: function() { __export.exportPngWhite(c, comp.name); } },
    { label: 'JPG', fn: function() { __export.exportJpg(c, comp.name); } },
    { label: 'SVG', fn: function() { __export.exportSvg(comp.svg(comp.w, comp.h), comp.name); } }
  ];
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.style.padding = '8px 16px';
    btn.style.fontSize = '13px';
    btn.textContent = b.label;
    btn.onclick = b.fn;
    actions.appendChild(btn);
  });
  document.getElementById('modalBg').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalBg').style.display = 'none';
}

function downloadPng(idx) {
  var comp = components[idx];
  var c = document.createElement('canvas');
  c.width = comp.w;
  c.height = comp.h;
  comp.render(c.getContext('2d'), comp.w, comp.h);
  __export.exportPngTransparent(c, comp.name);
}

function downloadJpg(idx) {
  var comp = components[idx];
  var c = document.createElement('canvas');
  c.width = comp.w;
  c.height = comp.h;
  comp.render(c.getContext('2d'), comp.w, comp.h);
  __export.exportJpg(c, comp.name, 0.92);

function downloadSvg(idx) {
  var comp = components[idx];
  var svgData = comp.svg(comp.w, comp.h);
  __export.exportSvg(svgData, comp.name);
}

   Context Menu
   ================================================================ */

function showCtxMenu(e, idx) {
  e.preventDefault();
  ctxMenuTarget = idx;
  var comp = components[idx];
  var menu = document.getElementById('ctxMenu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.innerHTML = '';
  var items = [
    { label: 'PNG (透明)', action: function() { downloadPng(idx); } },
    { label: 'PNG (白底)', action: function() { var c=document.createElement('canvas');c.width=comp.w;c.height=comp.h;comp.render(c.getContext('2d'),comp.w,comp.h);__export.exportPngWhite(c,comp.name); } },
    { label: 'JPG', action: function() { downloadJpg(idx); } },
    { label: 'SVG', action: function() { downloadSvg(idx); } },
    { label: '', sep: true },
    { label: '预览', action: function() { previewItem(idx); } }
  ];
  items.forEach(function(item) {
    if (item.sep) {
      var sep = document.createElement('div');
      sep.className = 'ctx-sep';
      menu.appendChild(sep);
      return;
    }
    var el = document.createElement('div');
    el.className = 'ctx-item';
    el.textContent = item.label;
    el.onclick = function() { item.action(); hideCtxMenu(); };
    menu.appendChild(el);
  });
}

function hideCtxMenu() {
  document.getElementById('ctxMenu').style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (e.target.closest('.ctx-menu')) return;
  hideCtxMenu();
});

/* ================================================================
   Selection & Batch
   ================================================================ */

function toggleItem(idx) {
  if (selection.has(idx)) selection.delete(idx);
  else selection.add(idx);
  updateUI();
}

function toggleSelectAll(checked) {
  selection.clear();
  if (checked) {
    components.forEach(function(comp, idx) {
      if (currentFilter === 'all' || comp.cat === currentFilter) selection.add(idx);
    });
  }
  updateUI();
}

function clearSelection() {
  selection.clear();
  updateUI();
}

function updateUI() {
  var bar = document.getElementById('batchBar');
  var count = selection.size;
  document.getElementById('batchCount').textContent = count;
  bar.classList.toggle('hidden', count === 0);
  document.querySelectorAll('.comp-card').forEach(function(card) {
    var idx = parseInt(card.dataset.idx);
    card.classList.toggle('selected', selection.has(idx));
    var cb = card.querySelector('.comp-card-check');
    if (cb) cb.checked = selection.has(idx);
  });
}

function batchDownload() {
  if (selection.size === 0) { __export.toast('请先选择组件', 'err'); return; }
  var arr = Array.from(selection).sort(function(a, b) { return a - b; });
  var total = arr.length;
  __export.setProgress(10);

  function processNext(i) {
    if (i >= total) {
      __export.setProgress(100);
      setTimeout(function() { __export.setProgress(0); }, 800);
      __export.toast('ZIP 打包完成', 'ok');
      return;
    }
    var idx = arr[i];
    var comp = components[idx];
    var c = document.createElement('canvas');
    c.width = comp.w;
    c.height = comp.h;
    comp.render(c.getContext('2d'), comp.w, comp.h);

    var svgStr = comp.svg(comp.w, comp.h);
    var svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });

    var pngData = __export.canvasToBlob(c, 'image/png');
    var svgData = Promise.resolve(svgBlob);

    var files = [
      { name: comp.name + '.png', data: pngData },
      { name: comp.name + '.svg', data: svgData }
    ];

    __export.batchDownloadZip(files, '空壳框架_' + comp.name + '_' + Date.now());
    __export.setProgress(Math.round(((i + 1) / total) * 90));
    setTimeout(function() { processNext(i + 1); }, 150);
  }
  processNext(0);
}

/* ================================================================
   Filter & Search
   ================================================================ */

function filterBy(cat) {
  currentFilter = cat;
  document.querySelectorAll('#filterTabs .filter-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderAll();
}

function searchComponents(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.comp-card').forEach(function(card) {
    var name = (card.dataset.name || '').toLowerCase();
    var match = q === '' || name.indexOf(q) !== -1;
    card.style.display = match ? '' : 'none';
  });
}

/* ================================================================
   Init
   ================================================================ */

function init() {
  renderAll();
  document.fonts.ready.then(function() {
    fontsLoaded = true;
    renderAll();
  });
  document.addEventListener('themechange', function() {
    renderAll();
  });

  var searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      searchComponents(this.value);
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'f') {
      e.preventDefault();
      if (searchInput) { searchInput.focus(); searchInput.select(); }
    }
    if (e.key === 'Escape') {
      hideCtxMenu();
      closeModal();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
