<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/common.css">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222240;
  --border-color: #2a2a4a;
  --border-glow: #4f46e5;
  --text-primary: #e8e8f0;
  --text-secondary: #9898b8;
  --text-muted: #6868a8;
  --accent-purple: #a855f7;
  --accent-green: #34d399;
  --accent-orange: #fb923c;
  --accent-pink: #f472b6;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 20px var(--accent-glow);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

body {
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

h1, h2, h3 { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
}

.topbar-inner {
  max-width: 1400px; margin: 0 auto; padding: 0 24px;
}

.topbar-header {
  display: flex; align-items: center; justify-content: space-between; padding: 16px 0;
}

.logo-area {
  display: flex; align-items: center; gap: 12px;
}

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-actions {
  display: flex; align-items: center; gap: 12px;
}

.main-content {
  max-width: 1400px; margin: 0 auto; padding: 24px;
}

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}

.section-title {
  font-size: 24px; font-weight: 700; color: var(--text-primary);
}

.section-subtitle {
  font-size: 14px; color: var(--text-secondary); margin-top: 4px;
}

.batch-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.batch-bar.hidden { display: none; }

.batch-count {
  background: var(--accent); color: white;
  padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
}

.btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border-color);
  background: var(--bg-card); color: var(--text-primary);
  transition: all var(--transition-fast);
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans SC', sans-serif;
}

.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }

.btn-primary {
  background: var(--accent); border-color: var(--accent); color: white;
}

.btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-glow); }

.btn-danger { border-color: #ef4444; color: #ef4444; }
.btn-danger:hover { background: rgba(239, 68, 68, 0.15); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.style-tabs {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}

.style-tab {
  padding: 8px 16px; border-radius: var(--radius-xl);
  font-size: 13px; cursor: pointer;
  border: 1px solid var(--border-color);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition-fast);
  user-select: none;
}

.style-tab:hover {
  border-color: var(--accent); color: var(--text-primary);
}

.style-tab.active {
  background: var(--accent); color: white;
  border-color: var(--accent); box-shadow: var(--shadow-glow);
}

.bg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.bg-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-normal);
  position: relative;
  cursor: pointer;
}

.bg-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow);
}

.bg-card.selected {
  border-color: var(--accent-secondary);
  box-shadow: 0 0 16px var(--accent-glow);
}

.bg-card-check {
  position: absolute; top: 12px; left: 12px; z-index: 5;
  width: 22px; height: 22px;
  accent-color: var(--accent-secondary);
  cursor: pointer;
}

.bg-card-preview {
  width: 100%; aspect-ratio: 4/3;
  background: var(--bg-secondary);
  overflow: hidden;
}

.bg-card-preview canvas {
  width: 100%; height: 100%;
  display: block;
}

.bg-card-info {
  padding: 14px;
}

.bg-card-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
}

.bg-card-actions {
  display: flex; gap: 8px;
}

.bg-card-actions .btn { flex: 1; justify-content: center; }

.progress-track {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  z-index: 9999; transition: width 0.3s ease;
  box-shadow: 0 0 12px var(--accent-glow);
}

.toast-stack {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%); z-index: 10001;
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; pointer-events: none;
}

.toast-msg {
  background: var(--bg-card); border: 1px solid var(--border-color);
  color: var(--text-primary); padding: 12px 24px;
  border-radius: 12px; font-size: 0.88rem; font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: toastSlide 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space: nowrap; pointer-events: auto; display: flex; align-items: center; gap: 8px;
}

.toast-msg.out { animation: toastOut 0.25s ease forwards; }
.toast-msg.ok { border-color: #34d399; border-left: 3px solid #34d399; }
.toast-msg.err { border-color: #f87171; border-left: 3px solid #f87171; }

@keyframes toastSlide {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(20px); }
}

.theme-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s ease; padding: 0;
}

.theme-btn:hover { transform: scale(1.15); }
.theme-btn.active { border-color: var(--accent-secondary); box-shadow: 0 0 10px var(--accent-glow); }

.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  padding: 8px 16px;
  min-width: 240px;
}

.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  width: 100%;
}

.search-box input::placeholder { color: var(--text-muted); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 20000; display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.active { display: flex; }

.modal-panel {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-lg); max-width: 900px; width: 92%;
  max-height: 90vh; overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  animation: modalSlide 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border-color);
}

.modal-title { font-size: 16px; font-weight: 600; }

.modal-close {
  background: none; border: none; color: var(--text-secondary);
  font-size: 20px; cursor: pointer; padding: 4px;
}

.modal-close:hover { color: var(--text-primary); }

.modal-body {
  padding: 20px; display: flex; flex-direction: column; gap: 16px;
  align-items: center;
}

.modal-canvas-wrap {
  width: 100%; max-width: 800px; aspect-ratio: 16/9;
  background: var(--bg-secondary); border-radius: var(--radius-sm);
  overflow: hidden;
}

.modal-canvas-wrap canvas { width: 100%; height: 100%; display: block; }

.modal-actions {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}

@media (max-width: 768px) {
  .bg-grid { grid-template-columns: 1fr; }
  .topbar-inner { padding: 0 12px; }
  .section-header { flex-direction: column; align-items: flex-start; }
  .search-box { width: 100%; min-width: auto; }
}
</style>

function cssVar(name, fallback) {
  try {
    var val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return val || fallback;
  } catch(e) { return fallback; }
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function seededRandom(seed) {
  var x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

function renderGridSquare(ctx, w, h) {
  var bgSecondary = cssVar('--bg-secondary', '#0f1729');
  var accent = cssVar('--accent', '#6366f1');
  ctx.fillStyle = bgSecondary;
  ctx.fillRect(0, 0, w, h);
  var step = 40;
  ctx.strokeStyle = hexToRgba(accent, 0.15);
  ctx.lineWidth = 1;
  for (var x = 0; x <= w; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (var y = 0; y <= h; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.strokeStyle = hexToRgba(accent, 0.35);
  ctx.lineWidth = 1;
  var bigStep = step * 5;
  for (var x2 = 0; x2 <= w; x2 += bigStep) {
    ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, h); ctx.stroke();
  }
  for (var y2 = 0; y2 <= h; y2 += bigStep) {
    ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(w, y2); ctx.stroke();
  }
}

function renderGridIso(ctx, w, h) {
  var bgSecondary = cssVar('--bg-secondary', '#0f1729');
  var accentSecondary = cssVar('--accent-secondary', '#22d3ee');
  ctx.fillStyle = bgSecondary;
  ctx.fillRect(0, 0, w, h);
  var size = 40;
  var hh = size * Math.sqrt(3) / 2;
  ctx.strokeStyle = hexToRgba(accentSecondary, 0.12);
  ctx.lineWidth = 1;
  for (var row = -1; row < h / hh + 1; row++) {
    for (var col = -1; col < w / size + 1; col++) {
      var cx = col * size * 1.5;
      var cy = row * hh + (col % 2 ? hh / 2 : 0);
      ctx.beginPath();
      ctx.moveTo(cx, cy - hh / 2);
      ctx.lineTo(cx + size / 2, cy);
      ctx.lineTo(cx, cy + hh / 2);
      ctx.lineTo(cx - size / 2, cy);
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function renderGeoWave(ctx, w, h) {
  var bgPrimary = cssVar('--bg-primary', '#0a0a1a');

    ctx.moveTo(0, baseY);

      var wy = baseY + Math.sin(wx * 0.008 + wave * 0.7) * h * 0.04;
      ctx.lineTo(wx, wy);
    }
    ctx.strokeStyle = hexToRgba(wave % 2 === 0 ? accent : accentSecondary, 0.12);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

function renderSpaceCircuit(ctx, w, h) {
  var bgPrimary = cssVar('--bg-primary', '#050510');
  var accentSecondary = cssVar('--accent-secondary', '#22d3ee');
  ctx.fillStyle = bgPrimary;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = hexToRgba(accentSecondary, 0.15);
  ctx.lineWidth = 1.5;
  var nodes = [];
  for (var i = 0; i < 40; i++) {
    nodes.push({ x: seededRandom(i + 700) * w, y: seededRandom(i + 800) * h });
  }
  for (var a = 0; a < nodes.length; a++) {
    for (var b = a + 1; b < nodes.length; b++) {
      var dx = nodes[b].x - nodes[a].x;
      var dy = nodes[b].y - nodes[a].y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        ctx.beginPath();
        var mx = (nodes[a].x + nodes[b].x) / 2;
        ctx.moveTo(nodes[a].x, nodes[a].y);
        ctx.lineTo(mx, nodes[a].y);
        ctx.lineTo(mx, nodes[b].y);
        ctx.lineTo(nodes[b].x, nodes[b].y);
        ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(nodes[a].x, nodes[a].y, 3, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(accentSecondary, 0.4);
    ctx.fill();
  }
}

function renderSpaceRadar(ctx, w, h) {
  var bgPrimary = cssVar('--bg-primary', '#020208');
  var accentGreen = cssVar('--accent-green', '#34d399');
  var accent = cssVar('--accent', '#6366f1');
  ctx.fillStyle = bgPrimary;
  ctx.fillRect(0, 0, w, h);
  var cx = w / 2, cy = h / 2;
  var maxR = Math.min(w, h) * 0.45;
  ctx.strokeStyle = hexToRgba(accentGreen, 0.2);
  ctx.lineWidth = 1;
  for (var r = maxR / 5; r <= maxR; r += maxR / 5) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (var d = 0; d < 8; d++) {
    var angle = (Math.PI * 2 / 8) * d;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    ctx.stroke();
  }
  var sweep = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  sweep.addColorStop(0, hexToRgba(accentGreen, 0));
  sweep.addColorStop(0.7, hexToRgba(accentGreen, 0.05));
  sweep.addColorStop(1, hexToRgba(accentGreen, 0.15));
  ctx.fillStyle = sweep;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, maxR, -Math.PI / 4, 0);
  ctx.closePath();
  ctx.fill();
  for (var bl = 0; bl < 5; bl++) {
    var br = (maxR / 5) * (bl + 1);
    var bx = cx + br * Math.cos(-Math.PI / 8);
    var by = cy + br * Math.sin(-Math.PI / 8);
    ctx.beginPath();
    ctx.arc(bx, by, 4, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(accent, 0.6);
    ctx.fill();
  }
}

function renderNatureOcean(ctx, w, h) {
  var accent = cssVar('--accent', '#6366f1');
  var accentSecondary = cssVar('--accent-secondary', '#22d3ee');
  var textPrimary = cssVar('--text-primary', '#e8e8f0');
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, hexToRgba(accent, 0.4));
  grad.addColorStop(0.3, hexToRgba(accentSecondary, 0.3));
  grad.addColorStop(0.6, hexToRgba(accent, 0.2));
  grad.addColorStop(1, hexToRgba(accent, 0.1));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = hexToRgba(textPrimary, 0.15);
  ctx.lineWidth = 1.5;
  for (var wave = 0; wave < 6; wave++) {
    ctx.beginPath();
    var baseY = h * 0.15 + wave * h * 0.12;
    ctx.moveTo(0, baseY + Math.sin(0) * h * 0.03);
    for (var wx = 0; wx <= w; wx += 5) {
      var wy = baseY + Math.sin(wx * 0.01 + wave * 1.5) * h * 0.03;
      ctx.lineTo(wx, wy);
    }
    ctx.stroke();
  }
  ctx.fillStyle = hexToRgba(textPrimary, 0.05);
  for (var f = 0; f < 3; f++) {
    ctx.beginPath();
    var fby = h * 0.15 + f * h * 0.2;
    ctx.moveTo(0, fby + Math.sin(0) * h * 0.03);
    for (var fx = 0; fx <= w; fx += 3) {
      var fwy = fby + Math.sin(fx * 0.008 + f * 2) * h * 0.04;
      ctx.lineTo(fx, fwy);
    }
    ctx.lineTo(w, fby + h * 0.05);
    ctx.lineTo(0, fby + h * 0.05);
    ctx.closePath();
    ctx.fill();
  }
  var fontFam = fontsLoaded ? "'Noto Sans SC', sans-serif" : 'sans-serif';
  ctx.fillStyle = hexToRgba(textPrimary, 0.3);
  ctx.font = 'bold ' + (w * 0.04) + 'px ' + fontFam;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

}

function renderNatureForest(ctx, w, h) {
  var accentGreen = cssVar('--accent-green', '#34d399');

  var sky = ctx.createLinearGradient(0, 0, 0, h * 0.5);

  sky.addColorStop(0.5, hexToRgba(accentGreen, 0.3));
  sky.addColorStop(1, hexToRgba(accentGreen, 0.15));
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h * 0.5);
  ctx.fillStyle = hexToRgba(accentGreen, 0.4);
  ctx.fillRect(0, h * 0.45, w, h * 0.55);
  ctx.fillStyle = hexToRgba(accentGreen, 0.5);
  ctx.fillRect(0, h * 0.45, w, h * 0.03);
  var trees = [];
  for (var t = 0; t < 10; t++) {
    trees.push({ x: seededRandom(t + 2100) * w, s: 0.5 + seededRandom(t + 2200) * 0.8, shade: seededRandom(t + 2300) * 30 });
  }
  trees.sort(function(a, b) { return a.s - b.s; });
  for (var ti = 0; ti < trees.length; ti++) {
    var tr = trees[ti];
    var th = tr.s * h * 0.3;
    var tw = tr.s * w * 0.08;
    ctx.fillStyle = '#3a5a2a';
    ctx.fillRect(tr.x - tw * 0.08, h * 0.45 - th, tw * 0.16, th);
    ctx.fillStyle = '#2a5a2a';
    ctx.beginPath();
    ctx.moveTo(tr.x, h * 0.42 - th);
    ctx.lineTo(tr.x - tw / 2, h * 0.45 - th * 0.3);
    ctx.lineTo(tr.x + tw / 2, h * 0.45 - th * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#3a6a3a';
    ctx.beginPath();
    ctx.moveTo(tr.x, h * 0.38 - th);
    ctx.lineTo(tr.x - tw * 0.6, h * 0.45 - th * 0.6);
    ctx.lineTo(tr.x + tw * 0.6, h * 0.45 - th * 0.6);
    ctx.closePath();
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,200,0.08)';
  for (var ray = 0; ray < 5; ray++) {
    var rx = w * 0.2 + ray * w * 0.15;
    ctx.beginPath();
    ctx.moveTo(rx, 0);
    ctx.lineTo(rx - w * 0.05, h * 0.5);
    ctx.lineTo(rx + w * 0.05, h * 0.5);
    ctx.closePath();
    ctx.fill();
  }
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(0, h * 0.75, w, h * 0.02);
  ctx.fillStyle = '#7a5a3a';
  for (var path = 0; path < 3; path++) {
    var pp = w * 0.15 + path * w * 0.3;
    ctx.beginPath();
    ctx.moveTo(pp - w * 0.02, h * 0.75);
    ctx.quadraticCurveTo(pp, h * 0.82, pp + w * 0.02, h);
    ctx.lineTo(pp - w * 0.02 + w * 0.03, h);
    ctx.lineTo(pp - w * 0.02 + w * 0.01, h * 0.75);
    ctx.closePath();
    ctx.fill();
  }
  var fontFam = fontsLoaded ? "'Noto Sans SC', sans-serif" : 'sans-serif';
  ctx.fillStyle = hexToRgba(textPrimary, 0.3);
  ctx.font = (w * 0.03) + 'px ' + fontFam;

function renderNatureMountain(ctx, w, h) {

function getFilteredPatterns() {
  return bgPatterns.filter(function(bg) {
    var catMatch = currentFilter === 'all' || bg.category === currentFilter;
    var searchMatch = !searchQuery || bg.name.indexOf(searchQuery) >= 0 || bg.id.indexOf(searchQuery) >= 0;
    return catMatch && searchMatch;
  });
}

function renderAssets() {
  var container = document.getElementById('assetGrid');
  var filtered = getFilteredPatterns();
  var html = '';
  filtered.forEach(function(bg) {
    var idx = bgPatterns.indexOf(bg);
    var selected = selection.has(idx) ? ' selected' : '';
    var checked = selection.has(idx) ? ' checked' : '';
    html += '<div class="bg-card' + selected + '" data-idx="' + idx + '" onclick="openPreview(' + idx + ')">';
    html += '<input type="checkbox" class="bg-card-check"' + checked + ' onchange="toggleItem(' + idx + ')" onclick="event.stopPropagation()">';
    html += '<div class="bg-card-preview"><canvas id="bg-canvas-' + idx + '" width="800" height="600"></canvas></div>';
    html += '<div class="bg-card-info"><div class="bg-card-name">' + bg.name + '</div>';
    html += '<div class="bg-card-actions">';
    html += '<button class="btn btn-sm" onclick="event.stopPropagation();downloadSingle(' + idx + ', \'png\')">PNG</button>';
    html += '<button class="btn btn-sm" onclick="event.stopPropagation();downloadSingle(' + idx + ', \'jpg\')">JPG</button>';
    html += '</div></div></div>';
  });
  container.innerHTML = html;
  filtered.forEach(function(bg) {
    var idx = bgPatterns.indexOf(bg);
    var canvas = document.getElementById('bg-canvas-' + idx);
    if (canvas) bg.render(canvas.getContext('2d'), 800, 600);
  });
}

function openPreview(idx) {
  previewIdx = idx;
  var bg = bgPatterns[idx];
  var modal = document.getElementById('previewModal');
  var title = document.getElementById('modalTitle');
  var canvas = document.getElementById('modalCanvas');
  var actions = document.getElementById('modalActions');
  title.textContent = bg.name + ' - 预览';
  bg.render(canvas.getContext('2d'), 1920, 1080);
  actions.innerHTML = '<button class="btn btn-primary" onclick="downloadSingle(' + idx + ', \'png\')">下载 PNG</button>' +
    '<button class="btn btn-primary" onclick="downloadSingle(' + idx + ', \'jpg\')">下载 JPG</button>' +
    '<button class="btn" onclick="closePreview()">关闭</button>';
  modal.classList.add('active');
}

function closePreview(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('previewModal').classList.remove('active');
  previewIdx = -1;
}

function downloadSingle(idx, format) {
  var c = document.createElement('canvas');
  c.width = 1920;
  c.height = 1080;
  bgPatterns[idx].render(c.getContext('2d'), 1920, 1080);
  if (format === 'png') {
    __export.exportPngTransparent(c, bgPatterns[idx].name);
  } else {
    __export.exportJpg(c, bgPatterns[idx].name, 0.95);
  }
}

function batchDownload() {
  if (selection.size === 0) { __export.toast('请先选择背景图案', 'err'); return; }
  var files = [];
  var arr = Array.from(selection).sort(function(a, b) { return a - b; });
  arr.forEach(function(idx, i) {
    var c = document.createElement('canvas');
    c.width = 1920;
    c.height = 1080;
    bgPatterns[idx].render(c.getContext('2d'), 1920, 1080);
    var name = bgPatterns[idx].name;
    __export.setProgress(Math.round((i / arr.length) * 80));
    files.push({ name: name + '.png', canvas: c });
  });
  __export.batchDownloadZip(
    files.map(function(f) { return { name: f.name, data: canvasToBlobPromise(f.canvas, 'image/png') }; }),
    '背景素材'
  );
}

function canvasToBlobPromise(canvas, mimeType) {
  return new Promise(function(resolve) {
    canvas.toBlob(function(b) { resolve(b); }, mimeType, 0.95);
  });
}

function toggleItem(idx) {
  if (selection.has(idx)) selection.delete(idx);
  else selection.add(idx);
  updateUI();
}

function toggleSelectAll(checked) {
  selection.clear();
  if (checked) {
    var filtered = getFilteredPatterns();
    filtered.forEach(function(bg) {
      selection.add(bgPatterns.indexOf(bg));
    });
  }
  updateUI();
}

function clearSelection() {
  selection.clear();
  updateUI();
}

function updateUI() {
  var bar = document.getElementById('batchBar');
  var count = selection.size;
  document.getElementById('batchCount').textContent = count;
  bar.classList.toggle('hidden', count === 0);
  document.querySelectorAll('.bg-card').forEach(function(card) {
    var idx = parseInt(card.dataset.idx);
    card.classList.toggle('selected', selection.has(idx));
    var cb = card.querySelector('.bg-card-check');
    if (cb) cb.checked = selection.has(idx);
  });
  var allFiltered = getFilteredPatterns();
  var allSelected = allFiltered.length > 0 && allFiltered.every(function(bg) { return selection.has(bgPatterns.indexOf(bg)); });
  document.getElementById('bgSelectAll').checked = allSelected;
}

function filterBy(cat) {
  currentFilter = cat;
  document.querySelectorAll('#subTabs .style-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderAssets();
  updateUI();
}

function handleSearch(value) {
  searchQuery = value.trim().toLowerCase();
  renderAssets();
  updateUI();
}

function init() {
  renderAssets();
  document.fonts.ready.then(function() {
    fontsLoaded = true;
    renderAssets();
  });
  document.addEventListener('themechange', function() {
    renderAssets();
    if (previewIdx >= 0) {
      var canvas = document.getElementById('modalCanvas');
      bgPatterns[previewIdx].render(canvas.getContext('2d'), 1920, 1080);
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePreview();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
