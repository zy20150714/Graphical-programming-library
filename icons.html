<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通用APP图标库 - 图形化编程素材库 v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/common.css">
<style>
:root { --grid-gap: 16px; --item-size: 140px; --header-height: 60px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Space Grotesk','Noto Sans SC',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; position:relative; }
.bg-glow { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:0.15; }
.bg-glow.g1 { width:600px; height:600px; top:-200px; left:-150px; background:var(--accent); }
.bg-glow.g2 { width:500px; height:500px; bottom:-200px; right:-150px; background:var(--accent-secondary); }
.bg-glow.g3 { width:400px; height:400px; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--accent); opacity:0.06; }
.topbar { position:sticky; top:0; z-index:100; background:var(--nav-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border-subtle); padding:0 24px; }
.topbar-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:var(--header-height); }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left .logo-mark { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--accent), var(--accent-secondary)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:white; box-shadow:0 4px 20px var(--accent-glow); flex-shrink:0; }
.topbar-left h1 { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
.topbar-left .back-link { font-size:13px; color:var(--text-secondary); text-decoration:none; display:flex; align-items:center; gap:4px; transition:color 0.2s; }
.topbar-left .back-link:hover { color:var(--accent); }
.topbar-right { display:flex; align-items:center; gap:8px; }
.theme-btn { padding:6px 12px; border-radius:8px; font-size:12px; font-weight:500; border:1px solid var(--border-subtle); background:var(--bg-input); color:var(--text-secondary); cursor:pointer; transition:all 0.2s; }
.theme-btn:hover { border-color:var(--accent); color:var(--text-primary); }
.theme-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.page-header { position:relative; z-index:1; padding:24px 32px 0; max-width:1400px; margin:0 auto; }
.page-header h1 { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
.page-header .subtitle { font-size:14px; color:var(--text-secondary); margin-top:4px; }
.toolbar { position:relative; z-index:1; display:flex; align-items:center; gap:12px; margin:16px 32px; max-width:1400px; margin-left:auto; margin-right:auto; flex-wrap:wrap; }
.search-box { flex:1; min-width:200px; max-width:360px; position:relative; }
.search-box input { width:100%; padding:8px 14px 8px 36px; border:1px solid var(--border-subtle); border-radius:8px; background:var(--bg-secondary); color:var(--text-primary); font-family:inherit; font-size:14px; outline:none; transition:border-color 0.2s; }
.search-box input:focus { border-color:var(--accent); }
.search-box .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
.style-filter { display:flex; align-items:center; gap:4px; }
.style-filter button { padding:6px 14px; border-radius:16px; font-family:inherit; font-size:13px; border:1px solid var(--border-subtle); background:transparent; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; }
.style-filter button:hover { border-color:var(--accent); color:var(--text-primary); }
.style-filter button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.batch-bar { display:flex; align-items:center; gap:8px; }
.batch-bar .sel-count { font-size:13px; color:var(--text-secondary); }
.batch-bar button { padding:6px 14px; border:1px solid var(--border-subtle); border-radius:6px; background:var(--bg-secondary); color:var(--text-primary); font-family:inherit; font-size:13px; cursor:pointer; transition:all 0.2s; }
.batch-bar button:hover { border-color:var(--accent); color:var(--accent); }
.batch-bar button:disabled { opacity:0.4; cursor:default; }
.cat-tabs { position:relative; z-index:1; display:flex; gap:4px; flex-wrap:wrap; margin:0 32px; max-width:1400px; margin-left:auto; margin-right:auto; }
.cat-tab-btn { padding:5px 14px; font-family:inherit; font-size:13px; border:1px solid var(--border-subtle); border-radius:16px; background:transparent; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; }
.cat-tab-btn:hover { border-color:var(--accent); color:var(--text-primary); }
.cat-tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.grid-wrap { position:relative; z-index:1; margin:16px 32px 60px; max-width:1400px; margin-left:auto; margin-right:auto; }
.grid-empty { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:15px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--item-size),1fr)); gap:var(--grid-gap); }
.grid-item { position:relative; background:var(--bg-secondary); border:1px solid var(--border-subtle); border-radius:12px; padding:10px; cursor:pointer; transition:all 0.2s; user-select:none; }
.grid-item:hover { border-color:var(--accent); box-shadow:0 4px 20px rgba(0,0,0,0.08); transform:translateY(-2px); }
.grid-item canvas { display:block; width:100%; height:auto; border-radius:6px; }
.grid-item .item-label { margin-top:6px; font-size:12px; text-align:center; color:var(--text-secondary); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.grid-item .item-style { margin-top:2px; font-size:10px; text-align:center; color:var(--text-muted); }
.grid-item .item-check { position:absolute; top:6px; left:6px; width:18px; height:18px; border-radius:4px; border:2px solid var(--border-subtle); background:var(--bg-primary); display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; transition:all 0.2s; opacity:0; }
.grid-item:hover .item-check { opacity:0.6; }
.grid-item .item-check.checked { opacity:1; background:var(--accent); border-color:var(--accent); }
.grid-item .item-actions { position:absolute; top:6px; right:6px; display:flex; gap:3px; opacity:0; transition:opacity 0.2s; }
.grid-item:hover .item-actions { opacity:1; }
.grid-item .item-actions button { width:24px; height:24px; border:none; border-radius:4px; background:var(--bg-primary); color:var(--text-secondary); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.grid-item .item-actions button:hover { color:var(--accent); }
.context-menu { position:fixed; z-index:1000; background:var(--bg-primary); border:1px solid var(--border-subtle); border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,0.12); padding:4px 0; min-width:180px; display:none; }
.context-menu .cm-item { padding:8px 16px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--text-primary); }
.context-menu .cm-item:hover { background:var(--bg-hover); }
.context-menu .cm-divider { height:1px; background:var(--border-subtle); margin:4px 0; }
.preview-modal { position:fixed; inset:0; background:var(--modal-overlay); z-index:3000; display:none; align-items:center; justify-content:center; }
.preview-modal.active { display:flex; }
.preview-panel { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:20px; padding:28px; max-width:520px; width:90%; box-shadow:0 32px 80px rgba(0,0,0,0.4); text-align:center; }
.preview-panel h3 { margin-bottom:12px; font-size:18px; }
.preview-panel .preview-canvas-wrap { background:var(--bg-primary); border-radius:12px; padding:20px; margin-bottom:16px; }
.preview-panel .preview-canvas-wrap canvas { max-width:100%; height:auto; }
.preview-panel .preview-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.preview-panel .preview-actions button { padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid var(--border-subtle); background:var(--bg-input); color:var(--text-primary); transition:all 0.2s; }
.preview-panel .preview-actions button:hover { border-color:var(--accent); }
.preview-panel .preview-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer; }
.progress-track { position:fixed; top:0; left:0; right:0; z-index:9999; height:3px; pointer-events:none; }
.progress-track .progress-bar { height:100%; background:var(--accent); width:0%; transition:width 0.3s ease; }
.toast-stack { position:fixed; bottom:24px; right:24px; z-index:9998; display:flex; flex-direction:column-reverse; gap:8px; pointer-events:none; }
.toast-item { padding:10px 20px; border-radius:8px; background:var(--bg-primary); color:var(--text-primary); font-size:13px; box-shadow:0 4px 20px rgba(0,0,0,0.12); border:1px solid var(--border-subtle); pointer-events:auto; animation:toastIn 0.3s ease; max-width:360px; }
@keyframes toastIn { from { opacity:0; transform:translateY(16px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
@media(max-width:768px){ .page-header { padding:16px 16px 0; } .toolbar { margin:12px 16px; flex-direction:column; align-items:stretch; } .search-box { max-width:none; } .cat-tabs { margin:0 16px; } .grid-wrap { margin:12px 16px 40px; } :root { --item-size:120px; } }
</style>
</head>
<body>

<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
<div class="toast-stack" id="toastStack"></div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <div class="logo-mark">I</div>
      <div>
        <h1>通用APP图标库</h1>
        <a href="index.html" class="back-link">&#x2190; 返回首页</a>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" data-theme-btn="dark-tech">暗色</button>
      <button class="theme-btn" data-theme-btn="light-clean">浅色</button>
      <button class="theme-btn" data-theme-btn="kids-color">彩色</button>
    </div>
  </div>
</div>

<div class="page-header">
  <h1>通用APP图标</h1>
  <div class="subtitle">150+ 图标 · 15 分类 · 3 种样式 · SVG / PNG 导出</div>
</div>

<div class="toolbar" id="toolbar">
  <div class="search-box">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" id="searchInput" placeholder="搜索图标名称...">
  </div>
  <div class="style-filter" id="styleFilter">
    <button class="active" data-style="all">全部样式</button>
    <button data-style="outline">描边</button>
    <button data-style="filled">填充</button>
    <button data-style="duo">双色</button>
  </div>
  <div class="batch-bar">
    <span class="sel-count" id="selCount">已选 0 项</span>
    <button id="batchZipBtn" disabled>ZIP 导出</button>
    <button id="selectAllBtn">全选</button>
    <button id="clearSelBtn">清空</button>
  </div>
</div>

<div class="cat-tabs" id="catTabs"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="grid-empty" id="gridEmpty" style="display:none;">未找到匹配的图标</div>
</div>

<div class="context-menu" id="contextMenu">
  <div class="cm-item" data-action="png-transparent">导出 PNG (透明)</div>
  <div class="cm-item" data-action="png-white">导出 PNG (白底)</div>
  <div class="cm-item" data-action="jpg">导出 JPG</div>
  <div class="cm-item" data-action="svg">导出 SVG</div>
  <div class="cm-divider"></div>
  <div class="cm-item" data-action="select">选择/取消选择</div>
</div>

<div class="preview-modal" id="previewModal">
  <div class="preview-panel" style="position:relative;">
    <button class="preview-close" id="previewClose">&times;</button>
    <h3 id="previewTitle">图标预览</h3>
    <div class="preview-canvas-wrap" id="previewCanvasWrap"></div>
    <div class="preview-actions" id="previewActions"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/theme.js"></script>
<script src="js/export.js"></script>
<script>
(function() {
  var COLORS = {
    fg: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#f0f0f5',
    accent: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6366f1',
    secondary: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#8a8a9a',
    muted: getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#555566'
  };
  function updateColors() {
    var s = getComputedStyle(document.documentElement);
    COLORS.fg = s.getPropertyValue('--text-primary').trim() || '#f0f0f5';
    COLORS.accent = s.getPropertyValue('--accent').trim() || '#6366f1';
    COLORS.secondary = s.getPropertyValue('--text-secondary').trim() || '#8a8a9a';
    COLORS.muted = s.getPropertyValue('--text-muted').trim() || '#555566';
  }
  document.addEventListener('themechange', updateColors);

  function svgWrap(size, content) {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' + content + '</svg>';
  }

  function themeStroke(ctx, width) { ctx.strokeStyle = COLORS.fg; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  function themeFill(ctx) { ctx.fillStyle = COLORS.fg; }
  function accentStroke(ctx, width) { ctx.strokeStyle = COLORS.accent; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  function accentFill(ctx) { ctx.fillStyle = COLORS.accent; }
  function secondaryStroke(ctx, width) { ctx.strokeStyle = COLORS.secondary; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; }
  function mutedFill(ctx) { ctx.fillStyle = COLORS.muted; }

  var ICONS = [];
  function reg(id, name, cat, subcat, styles, render, svgGen) {
    ICONS.push({ id: id, name: name, cat: cat, subcat: subcat, styles: styles, render: render, svg: svgGen });
  }

  function _poly(ctx, pts) { ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]); ctx.closePath(); }

  var m, u, s, sw;
  function base(ctx, sz) { m = sz*0.5; u = sz/16; sw = sz*0.055; }

  function svgStroke(swVal) { return ' stroke="' + COLORS.fg + '" stroke-width="' + swVal + '" stroke-linecap="round" stroke-linejoin="round"'; }
  function svgFill() { return ' fill="' + COLORS.fg + '"'; }
  function svgAccentFill() { return ' fill="' + COLORS.accent + '"'; }
  function svgAccentStroke(swVal) { return ' stroke="' + COLORS.accent + '" stroke-width="' + swVal + '" stroke-linecap="round" stroke-linejoin="round"'; }

  function makeIcon(id, name, cat, subcat, outlineR, outlineS, filledR, filledS, duoR, duoS) {
    reg(id + '-outline', name + ' (描边)', cat, subcat, ['outline'], outlineR, outlineS);
    reg(id + '-filled', name + ' (填充)', cat, subcat, ['filled'], filledR, filledS);
    reg(id + '-duo', name + ' (双色)', cat, subcat, ['duo'], duoR, duoS);
  }

  function pathHomeO(ctx, sz) { base(ctx, sz); themeStroke(ctx, sw); ctx.beginPath(); ctx.moveTo(m-5*u,m+2*u); ctx.lineTo(m,m-4*u); ctx.lineTo(m+5*u,m+2*u); ctx.stroke(); ctx.beginPath(); ctx.moveTo(m-3*u,m+2*u); ctx.lineTo(m-3*u,m+5*u); ctx.lineTo(m+3*u,m+5*u); ctx.lineTo(m+3*u,m+2*u); ctx.stroke(); }
  function svgHomeO(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polyline points="'+(m-5*u)+','+(m+2*u)+' '+m+','+(m-4*u)+' '+(m+5*u)+','+(m+2*u)+'" fill="none"'+svgStroke(sz*0.055)+'/><polyline points="'+(m-3*u)+','+(m+2*u)+' '+(m-3*u)+','+(m+5*u)+' '+(m+3*u)+','+(m+5*u)+' '+(m+3*u)+','+(m+2*u)+'" fill="none"'+svgStroke(sz*0.055)+'/>'); }
  function pathHomeF(ctx, sz) { base(ctx, sz); themeFill(ctx); ctx.beginPath(); ctx.moveTo(m,m-4*u); ctx.lineTo(m+5*u,m+2*u); ctx.lineTo(m+3*u,m+2*u); ctx.lineTo(m+3*u,m+5*u); ctx.lineTo(m-3*u,m+5*u); ctx.lineTo(m-3*u,m+2*u); ctx.lineTo(m-5*u,m+2*u); ctx.closePath(); ctx.fill(); }
  function svgHomeF(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polygon points="'+m+','+(m-4*u)+' '+(m+5*u)+','+(m+2*u)+' '+(m+3*u)+','+(m+2*u)+' '+(m+3*u)+','+(m+5*u)+' '+(m-3*u)+','+(m+5*u)+' '+(m-3*u)+','+(m+2*u)+' '+(m-5*u)+','+(m+2*u)+'"'+svgFill()+'/>'); }
  function pathHomeD(ctx, sz) { base(ctx, sz); themeStroke(ctx, sw); ctx.beginPath(); ctx.moveTo(m-5*u,m+2*u); ctx.lineTo(m,m-4*u); ctx.lineTo(m+5*u,m+2*u); ctx.stroke(); ctx.beginPath(); ctx.moveTo(m-3*u,m+2*u); ctx.lineTo(m-3*u,m+5*u); ctx.lineTo(m+3*u,m+5*u); ctx.lineTo(m+3*u,m+2*u); ctx.stroke(); accentFill(ctx); ctx.beginPath(); ctx.moveTo(m,m-1*u); ctx.lineTo(m+1.5*u,m+0.5*u); ctx.lineTo(m+1*u,m+0.5*u); ctx.lineTo(m+1*u,m+3.5*u); ctx.lineTo(m-1*u,m+3.5*u); ctx.lineTo(m-1*u,m+0.5*u); ctx.lineTo(m-1.5*u,m+0.5*u); ctx.closePath(); ctx.fill(); }
  function svgHomeD(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polyline points="'+(m-5*u)+','+(m+2*u)+' '+m+','+(m-4*u)+' '+(m+5*u)+','+(m+2*u)+'" fill="none"'+svgStroke(sz*0.055)+'/><polyline points="'+(m-3*u)+','+(m+2*u)+' '+(m-3*u)+','+(m+5*u)+' '+(m+3*u)+','+(m+5*u)+' '+(m+3*u)+','+(m+2*u)+'" fill="none"'+svgStroke(sz*0.055)+'/><polygon points="'+m+','+(m-1*u)+' '+(m+1.5*u)+','+(m+0.5*u)+' '+(m+1*u)+','+(m+0.5*u)+' '+(m+1*u)+','+(m+3.5*u)+' '+(m-1*u)+','+(m+3.5*u)+' '+(m-1*u)+','+(m+0.5*u)+' '+(m-1.5*u)+','+(m+0.5*u)+'"'+svgAccentFill()+'/>'); }
  makeIcon('home','主页','nav','nav',pathHomeO,svgHomeO,pathHomeF,svgHomeF,pathHomeD,svgHomeD);

  function pathBackO(ctx, sz) { base(ctx, sz); themeStroke(ctx, sz*0.06); ctx.beginPath(); ctx.moveTo(m+3*u,m-4*u); ctx.lineTo(m-2.5*u,m); ctx.lineTo(m+3*u,m+4*u); ctx.stroke(); }
  function svgBackO(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polyline points="'+(m+3*u)+','+(m-4*u)+' '+(m-2.5*u)+','+m+' '+(m+3*u)+','+(m+4*u)+'" fill="none" stroke="' + COLORS.fg + '" stroke-width="'+(sz*0.06)+'" stroke-linecap="round" stroke-linejoin="round"/>'); }
  function pathBackF(ctx, sz) { base(ctx, sz); themeFill(ctx); _poly(ctx, [[m+3*u,m-4*u],[m-2.5*u,m],[m+3*u,m+4*u],[m+1.5*u,m],[m+3*u,m-4*u]]); ctx.fill(); }
  function svgBackF(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polygon points="'+(m+3*u)+','+(m-4*u)+' '+(m-2.5*u)+','+m+' '+(m+3*u)+','+(m+4*u)+' '+(m+1.5*u)+','+m+'"'+svgFill()+'/>'); }
  function pathBackD(ctx, sz) { pathBackO(ctx, sz); }
  function svgBackD(sz) { return svgBackO(sz); }
  makeIcon('back','返回','nav','nav',pathBackO,svgBackO,pathBackF,svgBackF,pathBackD,svgBackD);

  function pathForwardO(ctx, sz) { base(ctx, sz); themeStroke(ctx, sz*0.06); ctx.beginPath(); ctx.moveTo(m-3*u,m-4*u); ctx.lineTo(m+2.5*u,m); ctx.lineTo(m-3*u,m+4*u); ctx.stroke(); }
  function svgForwardO(sz) { m=sz*0.5; u=sz/16; return svgWrap(sz, '<polyline points="'+(m-3*u)+','+(m-4*u)+' '+(m+2.5*u)+','+m+' '+(m-3*u)+','+(m+4*u)+'" fill="none" stroke="' + COLORS.fg + '" stroke-width="'+(sz*0.06)+'" stroke-linecap="round" stroke-linejoin="round"/>'); }

  var currentCategory = 'all';
  var currentStyle = 'all';
  var searchQuery = '';
  var selectedIcons = [];
  var previewIcon = null;

  var categoryNames = {
    all: '全部',
    nav: '导航',
    file: '文件',
    edit: '编辑',
    media: '媒体',
    comm: '通信',
    device: '设备',
    status: '状态',
    action: '操作',
    data: '数据',
    settings: '设置',
    weather: '天气',
    time: '时间',
    location: '位置',
    shopping: '购物',
    decoration: '装饰'
  };

  function getFilteredIcons() {
    return ICONS.filter(function(icon) {
      var catMatch = currentCategory === 'all' || icon.category === currentCategory;
      var styleMatch = currentStyle === 'all' || icon.styles.indexOf(currentStyle) !== -1;
      var searchMatch = !searchQuery || icon.name.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1 || icon.id.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1;
      return catMatch && styleMatch && searchMatch;
    });
  }

  function renderGrid() {
    var grid = document.getElementById('iconGrid');
    var icons = getFilteredIcons();
    grid.innerHTML = '';
    icons.forEach(function(icon) {
      var card = document.createElement('div');
      card.className = 'icon-card' + (selectedIcons.indexOf(icon.id) !== -1 ? ' selected' : '');
      card.dataset.id = icon.id;
      var canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      var ctx = canvas.getContext('2d');
      icon.render(ctx, 64);
      var label = document.createElement('div');
      label.className = 'icon-label';
      label.textContent = icon.name;
      var styleTag = document.createElement('div');
      styleTag.className = 'icon-style-tag';
      styleTag.textContent = icon.styles[0] === 'outline' ? '描边' : icon.styles[0] === 'filled' ? '填充' : '双色';
      card.appendChild(canvas);
      card.appendChild(label);
      card.appendChild(styleTag);
      card.addEventListener('click', function(e) {
        if (e.shiftKey) {
          toggleSelect(icon.id);
        } else {
          openPreview(icon);
        }
      });
      grid.appendChild(card);
    });
    document.getElementById('resultCount').textContent = '显示 ' + icons.length + ' 个图标';
  }

  function toggleSelect(id) {
    var idx = selectedIcons.indexOf(id);
    if (idx !== -1) {
      selectedIcons.splice(idx, 1);
    } else {
      selectedIcons.push(id);
    }
    renderGrid();
    updateBatchBar();
  }

  function updateBatchBar() {
    var bar = document.getElementById('batchBar');
    if (selectedIcons.length > 0) {
      bar.classList.add('active');
      document.getElementById('batchCount').textContent = selectedIcons.length;
    } else {
      bar.classList.remove('active');
    }
  }

  function openPreview(icon) {
    previewIcon = icon;
    var modal = document.getElementById('previewModal');
    var canvas = document.getElementById('previewCanvas');
    canvas.width = 128;
    canvas.height = 128;
    var ctx = canvas.getContext('2d');
    icon.render(ctx, 128);
    document.getElementById('previewName').textContent = icon.name;
    document.getElementById('previewId').textContent = icon.id;
    document.getElementById('previewCategory').textContent = '分类: ' + (categoryNames[icon.category] || icon.category);
    document.getElementById('previewStyle').textContent = '样式: ' + (icon.styles[0] === 'outline' ? '描边' : icon.styles[0] === 'filled' ? '填充' : '双色');
    modal.classList.add('active');
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('active');
    previewIcon = null;
  }

  function exportPNG(icon, size) {
    size = size || 128;
    var canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    icon.render(ctx, size);
    var link = document.createElement('a');
    link.download = icon.id + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function exportSVG(icon, size) {
    size = size || 128;
    var svg = icon.genSvg(size);
    var blob = new Blob([svg], {type: 'image/svg+xml'});
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.download = icon.id + '.svg';
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
  }

  function batchExportZIP() {
    if (typeof JSZip === 'undefined') {
      alert('JSZip 库未加载');
      return;
    }
    var zip = new JSZip();
    var icons = ICONS.filter(function(icon) { return selectedIcons.indexOf(icon.id) !== -1; });
    var count = 0;
    icons.forEach(function(icon) {
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');
      icon.render(ctx, 128);
      var pngData = canvas.toDataURL('image/png').split(',')[1];
      zip.file(icon.id + '.png', pngData, {base64: true});
      zip.file(icon.id + '.svg', icon.genSvg(128));
      count++;
    });
    zip.generateAsync({type: 'blob'}).then(function(blob) {
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.download = 'icons-batch-' + count + '.zip';
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    });
  }

  function buildTabs() {
    var tabs = document.getElementById('categoryTabs');
    var cats = ['all','nav','file','edit','media','comm','device','status','action','data','settings','weather','time','location','shopping','decoration'];
    cats.forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn' + (cat === 'all' ? ' active' : '');
      btn.textContent = categoryNames[cat];
      btn.dataset.cat = cat;
      btn.addEventListener('click', function() {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderGrid();
      });
      tabs.appendChild(btn);
    });
  }

  function buildStyleFilter() {
    var filter = document.getElementById('styleFilter');
    var styles = [
      {id: 'all', label: '全部'},
      {id: 'outline', label: '描边'},
      {id: 'filled', label: '填充'},
      {id: 'duo', label: '双色'}
    ];
    styles.forEach(function(st) {
      var btn = document.createElement('button');
      btn.className = 'style-btn' + (st.id === 'all' ? ' active' : '');
      btn.textContent = st.label;
      btn.dataset.style = st.id;
      btn.addEventListener('click', function() {
        currentStyle = st.id;
        document.querySelectorAll('.style-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderGrid();
      });
      filter.appendChild(btn);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    buildTabs();
    buildStyleFilter();
    renderGrid();

    document.getElementById('searchInput').addEventListener('input', function(e) {
      searchQuery = e.target.value.trim();
      renderGrid();
    });

    document.getElementById('closePreview').addEventListener('click', closePreview);
    document.getElementById('previewModal').addEventListener('click', function(e) {
      if (e.target === this) closePreview();
    });

    document.getElementById('exportPngBtn').addEventListener('click', function() {
      if (previewIcon) exportPNG(previewIcon, 128);
    });
    document.getElementById('exportSvgBtn').addEventListener('click', function() {
      if (previewIcon) exportSVG(previewIcon, 128);
    });

    document.getElementById('batchZipBtn').addEventListener('click', batchExportZIP);
    document.getElementById('clearSelectionBtn').addEventListener('click', function() {
      selectedIcons = [];
      renderGrid();
      updateBatchBar();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePreview();
    });

    window.addEventListener('themechange', function() {
      updateColors();
      renderGrid();
      if (previewIcon) {
        var canvas = document.getElementById('previewCanvas');
        var ctx = canvas.getContext('2d');
        previewIcon.render(ctx, 128);
      }
    });
  });
</script>
</body>
</html>
