<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI组件素材 - 图形化编程素材库</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/common.css">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222240;
  --border-color: #2a2a4a;
  --border-glow: #4f46e5;
  --text-primary: #e8e8f0;
  --text-secondary: #9898b8;
  --text-muted: #6868a8;
  --accent-purple: #a855f7;
  --accent-green: #34d399;
  --accent-orange: #fb923c;
  --accent-pink: #f472b6;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 20px var(--glow-indigo);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}
body {
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
h1, h2, h3 { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
}
.topbar-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
.topbar-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.main-content { max-width: 1400px; margin: 0 auto; padding: 24px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.section-title { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.section-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.batch-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.batch-bar.hidden { display: none; }
.batch-count {
  background: var(--accent); color: white;
  padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border-color);
  background: var(--bg-card); color: var(--text-primary);
  transition: all var(--transition-fast);
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans SC', sans-serif;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-glow); }
.btn-danger { border-color: #ef4444; color: #ef4444; }
.btn-danger:hover { background: rgba(239, 68, 68, 0.15); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.style-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.style-tab {
  padding: 8px 16px; border-radius: var(--radius-xl);
  font-size: 13px; cursor: pointer;
  border: 1px solid var(--border-color);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition-fast);
  user-select: none;
}
.style-tab:hover { border-color: var(--accent); color: var(--text-primary); }
.style-tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: var(--shadow-glow); }
.variant-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.variant-tab {
  padding: 6px 14px; border-radius: var(--radius-xl);
  font-size: 12px; cursor: pointer;
  border: 1px solid var(--border-color);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition-fast);
  user-select: none;
}
.variant-tab:hover { border-color: var(--accent); color: var(--text-primary); }
.variant-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.search-box {
  display: flex; align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 8px 14px; gap: 8px;
  margin-bottom: 20px; max-width: 400px;
}
.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 14px; width: 100%;
  font-family: 'Noto Sans SC', sans-serif;
}
.search-box input::placeholder { color: var(--text-muted); }
.ui-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.ui-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-normal);
  position: relative; cursor: pointer;
}
.ui-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: var(--shadow-glow); }
.ui-card.selected { border-color: var(--accent-secondary); box-shadow: 0 0 16px var(--accent-glow); }
.ui-card-check {
  position: absolute; top: 12px; left: 12px; z-index: 5;
  width: 22px; height: 22px;
  accent-color: var(--accent-secondary); cursor: pointer;
}
.ui-card-preview {
  width: 100%; aspect-ratio: 3/1;
  background: var(--bg-secondary);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.ui-card-preview canvas { width: 100%; height: 100%; display: block; }
.ui-card-info { padding: 14px; }
.ui-card-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; }
.ui-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.ui-card-actions .btn { flex: 1; justify-content: center; min-width: 50px; }
.progress-track {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  z-index: 9999; transition: width 0.3s ease;
  box-shadow: 0 0 12px var(--accent-glow);
}
.toast-stack {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%); z-index: 10001;
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; pointer-events: none;
}
.toast-msg {
  background: var(--bg-card); border: 1px solid var(--border-color);
  color: var(--text-primary); padding: 12px 24px;
  border-radius: 12px; font-size: 0.88rem; font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: toastSlide 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space: nowrap; pointer-events: auto; display: flex; align-items: center; gap: 8px;
}
.toast-msg.out { animation: toastOut 0.25s ease forwards; }
.toast-msg.ok { border-color: #34d399; border-left: 3px solid #34d399; }
.toast-msg.err { border-color: #f87171; border-left: 3px solid #f87171; }
@keyframes toastSlide {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(20px); }
}
.theme-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s ease; padding: 0;
}
.theme-btn:hover { transform: scale(1.15); }
.theme-btn.active { border-color: var(--accent-secondary); box-shadow: 0 0 10px var(--accent-glow); }
@media (max-width: 768px) {
  .ui-grid { grid-template-columns: 1fr; }
  .topbar-inner { padding: 0 12px; }
  .section-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="progress-track" id="progressBar" style="width:0%"></div>
<div class="toast-stack" id="toastStack"></div>
<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-header">
      <div class="logo-area">
        <div class="logo-icon">&#9632;</div>
        <span class="logo-text">UI组件素材库</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-btn" data-theme-btn="dark-tech" onclick="__theme.switch('dark-tech')" style="background:#0a0a0f;border-color:#6366f1;"></button>
        <button class="theme-btn" data-theme-btn="light-clean" onclick="__theme.switch('light-clean')" style="background:#f8f9fa;border-color:#2563eb;"></button>
        <button class="theme-btn" data-theme-btn="kids-color" onclick="__theme.switch('kids-color')" style="background:#fff8e7;border-color:#ff6b6b;"></button>
      </div>
    </div>
  </div>
</header>
<main class="main-content">
  <div class="section-header">
    <div>
      <h2 class="section-title">UI组件素材</h2>
      <p class="section-subtitle">Canvas生成的UI组件，支持PNG/JPG/SVG导出，50个组件，10个分类</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" style="accent-color:var(--accent-secondary);"> 全选
      </label>
    </div>
  </div>
  <div class="batch-bar hidden" id="batchBar">
    <span class="batch-count" id="batchCount">0</span>
    <span style="font-size:13px;color:var(--text-secondary);">已选择</span>
    <button class="btn btn-primary" onclick="batchDownload()">批量下载 (ZIP)</button>
    <button class="btn btn-danger" onclick="clearSelection()">取消选择</button>
  </div>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="searchInput" placeholder="搜索组件名称..." oninput="handleSearch(this.value)">
  </div>
  <div class="style-tabs" id="subTabs">
    <div class="style-tab active" data-cat="all" onclick="filterBy('all')">全部</div>
    <div class="style-tab" data-cat="buttons" onclick="filterBy('buttons')">按钮</div>
    <div class="style-tab" data-cat="inputs" onclick="filterBy('inputs')">输入框</div>
    <div class="style-tab" data-cat="selection" onclick="filterBy('selection')">选择控件</div>
    <div class="style-tab" data-cat="progress" onclick="filterBy('progress')">进度与加载</div>
    <div class="style-tab" data-cat="info" onclick="filterBy('info')">信息展示</div>
    <div class="style-tab" data-cat="navigation" onclick="filterBy('navigation')">导航</div>
    <div class="style-tab" data-cat="feedback" onclick="filterBy('feedback')">反馈</div>
    <div class="style-tab" data-cat="data" onclick="filterBy('data')">数据展示</div>
    <div class="style-tab" data-cat="media" onclick="filterBy('media')">媒体控件</div>
    <div class="style-tab" data-cat="social" onclick="filterBy('social')">社交元素</div>
  </div>
  <div class="variant-tabs" id="variantTabs">
    <div class="variant-tab active" data-variant="default" onclick="filterVariant('default')">默认</div>
    <div class="variant-tab" data-variant="primary" onclick="filterVariant('primary')">主要</div>
    <div class="variant-tab" data-variant="success" onclick="filterVariant('success')">成功</div>
    <div class="variant-tab" data-variant="warning" onclick="filterVariant('warning')">警告</div>
    <div class="variant-tab" data-variant="danger" onclick="filterVariant('danger')">危险</div>
  </div>
  <div class="ui-grid" id="assetGrid"></div>
</main>
<script src="js/theme.js"></script>
<script src="js/export.js"></script>
<script>
var fontsLoaded = false;
var currentFilter = 'all';
var currentVariant = 'default';
var searchQuery = '';
var selection = new Set();
var PREVIEW_W = 360, PREVIEW_H = 120;
var EXPORT_W = 400, EXPORT_H = 200;
function cssVar(name, fallback) {
  try { var val = getComputedStyle(document.documentElement).getPropertyValue(name).trim(); return val || fallback; }
  catch(e) { return fallback; }
}
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function svgRect(x, y, w, h, r, fill, stroke, sw) {
  var rx = r ? ' rx="' + r + '" ry="' + r + '"' : '';
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '"' + rx + ' fill="' + fill + '"' + s + swA + '/>';
}
function svgCircle(cx, cy, r, fill, stroke, sw) {
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + fill + '"' + s + swA + '/>';
}
function svgText(x, y, text, fill, fontSize, align, family, bold) {
  var a = align ? ' text-anchor="' + align + '"' : '';
  var fw = bold ? ' font-weight="bold"' : '';
  var fm = family || 'sans-serif';
  return '<text x="' + x + '" y="' + y + '"' + a + ' font-family="' + fm + '" font-size="' + fontSize + '" fill="' + fill + '"' + fw + '>' + text + '</text>';
}
function svgPath(d, fill, stroke, sw) {
  var f = fill ? ' fill="' + fill + '"' : ' fill="none"';
  var s = stroke ? ' stroke="' + stroke + '"' : '';
  var swA = sw ? ' stroke-width="' + sw + '"' : '';
  return '<path d="' + d + '"' + f + s + swA + '/>';
}
function svgGradient(id, x1, y1, x2, y2, stops) {
  var s = '';
  stops.forEach(function(st) { s += '<stop offset="' + st[0] + '" stop-color="' + st[1] + '"/>'; });
  return '<linearGradient id="' + id + '" x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '">' + s + '</linearGradient>';
}
function svgWrap(w, h, defs, content) {
  var d = defs ? '<defs>' + defs + '</defs>' : '';
  return '<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' + d + content + '\n</svg>';
}
function getVariantColor(variant) {
  if (variant === 'primary') return cssVar('--accent', '#6366f1');
  if (variant === 'success') return cssVar('--success', '#34d399');
  if (variant === 'warning') return cssVar('--warning', '#fbbf24');
  if (variant === 'danger') return cssVar('--danger', '#f87171');
  return cssVar('--accent', '#6366f1');
}
function getVariantColorSecondary(variant) {
  if (variant === 'primary') return cssVar('--accent-secondary', '#22d3ee');
  if (variant === 'success') return cssVar('--accent-green', '#34d399');
  if (variant === 'warning') return cssVar('--accent-orange', '#fb923c');
  if (variant === 'danger') return cssVar('--accent-pink', '#f472b6');
  return cssVar('--accent-secondary', '#22d3ee');
}
var FF = "'Noto Sans SC', sans-serif";
var FM = "'Space Grotesk', sans-serif";
function getFont() { return fontsLoaded ? FF : 'sans-serif'; }
function getMonoFont() { return fontsLoaded ? FM : 'sans-serif'; }
/* ========== 1. Buttons ========== */
function renderBtnRounded(ctx, w, h, variant) {
  ctx.clearRect(0, 0, w, h);
  var color = getVariantColor(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  ctx.fillStyle = color; roundRect(ctx, bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 15px ' + getFont(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('确认', bx + bw / 2, by + bh / 2);
}
function genBtnRoundedSvg(w, h, variant) {
  var color = getVariantColor(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  return svgWrap(w, h, '', svgRect(bx, by, bw, bh, 10, color) + svgText(bx + bw / 2, by + bh / 2 + 5, '确认', '#ffffff', '15px', 'middle', getFont(), true));
}
function renderBtnPill(ctx, w, h, variant) {
  ctx.clearRect(0, 0, w, h);
  var color = getVariantColor(variant);
  var bgPrimary = cssVar('--bg-primary', '#0a0a0f');
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  ctx.fillStyle = color; roundRect(ctx, bx, by, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = bgPrimary; ctx.font = 'bold 15px ' + getFont(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('开始', bx + bw / 2, by + bh / 2);
}
function genBtnPillSvg(w, h, variant) {
  var color = getVariantColor(variant);
  var bgPrimary = cssVar('--bg-primary', '#0a0a0f');
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  return svgWrap(w, h, '', svgRect(bx, by, bw, bh, 22, color) + svgText(bx + bw / 2, by + bh / 2 + 5, '开始', bgPrimary, '15px', 'middle', getFont(), true));
}
function renderBtnGradient(ctx, w, h, variant) {
  ctx.clearRect(0, 0, w, h);
  var color = getVariantColor(variant);
  var color2 = getVariantColorSecondary(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  var grad = ctx.createLinearGradient(bx, by, bx + bw, by);
  grad.addColorStop(0, color); grad.addColorStop(1, color2);
  ctx.fillStyle = grad; roundRect(ctx, bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 15px ' + getFont(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('提交', bx + bw / 2, by + bh / 2);
}
function genBtnGradientSvg(w, h, variant) {
  var color = getVariantColor(variant);
  var color2 = getVariantColorSecondary(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  var defs = svgGradient('g1', bx, by, bx + bw, by, [['0%', color], ['100%', color2]]);
  return svgWrap(w, h, defs, svgRect(bx, by, bw, bh, 10, 'url(#g1)') + svgText(bx + bw / 2, by + bh / 2 + 5, '提交', '#ffffff', '15px', 'middle', getFont(), true));
}
function renderBtnOutline(ctx, w, h, variant) {
  ctx.clearRect(0, 0, w, h);
  var color = getVariantColor(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  ctx.strokeStyle = color; ctx.lineWidth = 2; roundRect(ctx, bx, by, bw, bh, 10); ctx.stroke();
  ctx.fillStyle = color; ctx.font = 'bold 15px ' + getFont(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('取消', bx + bw / 2, by + bh / 2);
}
function genBtnOutlineSvg(w, h, variant) {
  var color = getVariantColor(variant);
  var bw = 140, bh = 44, bx = (w - bw) / 2, by = (h - bh) / 2;
  return svgWrap(w, h, '', svgRect(bx, by, bw, bh, 10, 'transparent', color, 2) + svgText(bx + bw / 2, by + bh / 2 + 5, '取消', color, '15px', 'middle', getFont(), true));
}
function renderBtnIcon(ctx, w, h, variant) {
  ctx.clearRect(0, 0, w, h);
  var bgCard = cssVar('--bg-card', '#1a1a2e');

/* ========== UI Logic ========== */
function showToast(msg, type) {
  type = type || 'ok';
  var stack = document.getElementById('toastStack');
  var el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(function() {
    el.classList.add('out');
    setTimeout(function() { el.remove(); }, 300);
  }, 2500);
}

function updateProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderGrid() {
  updateProgress(30);
  var grid = document.getElementById('assetGrid');
  grid.innerHTML = '';
  var filtered = COMPONENTS.filter(function(c) {
    var catMatch = currentFilter === 'all' || c.cat === currentFilter;
    var searchMatch = !searchQuery || c.name.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1;
    return catMatch && searchMatch;
  });
  filtered.forEach(function(comp, idx) {
    var card = document.createElement('div');
    card.className = 'ui-card';
    card.dataset.id = comp.id;
    if (selection.has(comp.id)) card.classList.add('selected');
    var check = document.createElement('input');
    check.type = 'checkbox';
    check.className = 'ui-card-check';
    check.checked = selection.has(comp.id);
    check.onchange = function(e) { e.stopPropagation(); toggleSelect(comp.id); };
    var preview = document.createElement('div');
    preview.className = 'ui-card-preview';
    var canvas = document.createElement('canvas');
    canvas.width = PREVIEW_W; canvas.height = PREVIEW_H;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    canvas.width = PREVIEW_W * dpr; canvas.height = PREVIEW_H * dpr;
    canvas.style.width = PREVIEW_W + 'px'; canvas.style.height = PREVIEW_H + 'px';
    ctx.scale(dpr, dpr);
    try { comp.render(ctx, PREVIEW_W, PREVIEW_H, currentVariant); } catch(e) {}
    preview.appendChild(canvas);
    var info = document.createElement('div');
    info.className = 'ui-card-info';
    var name = document.createElement('div');
    name.className = 'ui-card-name';
    name.textContent = comp.name;
    var actions = document.createElement('div');
    actions.className = 'ui-card-actions';
    ['PNG', 'JPG', 'SVG'].forEach(function(fmt) {
      var btn = document.createElement('button');
      btn.className = 'btn btn-sm';
      btn.textContent = fmt;
      btn.onclick = function(e) { e.stopPropagation(); downloadComponent(comp, fmt); };
      actions.appendChild(btn);
    });
    info.appendChild(name); info.appendChild(actions);
    card.appendChild(check); card.appendChild(preview); card.appendChild(info);
    card.onclick = function(e) {
      if (e.target === check) return;
      var cvs = document.createElement('canvas');
      cvs.width = EXPORT_W; cvs.height = EXPORT_H;
      var cx = cvs.getContext('2d');
      var dpr2 = window.devicePixelRatio || 1;
      cvs.width = EXPORT_W * dpr2; cvs.height = EXPORT_H * dpr2;
      cx.scale(dpr2, dpr2);
      try { comp.render(cx, EXPORT_W, EXPORT_H, currentVariant); } catch(e) {}
      var url = cvs.toDataURL('image/png');
      var win = window.open();
      win.document.write('<img src="' + url + '" style="max-width:100%">');
    };
    grid.appendChild(card);
  });
  updateProgress(100);
  setTimeout(function() { updateProgress(0); }, 400);
}

function downloadComponent(comp, fmt) {
  try {
    if (fmt === 'SVG') {
      var svg = comp.genSvg(EXPORT_W, EXPORT_H, currentVariant);
      var blob = new Blob([svg], { type: 'image/svg+xml' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = comp.id + '_' + currentVariant + '.svg'; a.click();
      URL.revokeObjectURL(url);
    } else {
      var cvs = document.createElement('canvas');
      cvs.width = EXPORT_W; cvs.height = EXPORT_H;
      var cx = cvs.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      cvs.width = EXPORT_W * dpr; cvs.height = EXPORT_H * dpr;
      cx.scale(dpr, dpr);
      comp.render(cx, EXPORT_W, EXPORT_H, currentVariant);
      var mime = fmt === 'JPG' ? 'image/jpeg' : 'image/png';
      var url = cvs.toDataURL(mime, 0.92);
      var a = document.createElement('a');
      a.href = url; a.download = comp.id + '_' + currentVariant + '.' + fmt.toLowerCase(); a.click();
    }
    showToast(comp.name + ' ' + fmt + ' 已下载', 'ok');
  } catch(e) { showToast('下载失败: ' + e.message, 'err'); }
}

function toggleSelect(id) {
  if (selection.has(id)) selection.delete(id); else selection.add(id);
  updateSelectionUI();
  renderGrid();
}

function toggleSelectAll(checked) {
  if (checked) COMPONENTS.forEach(function(c) { selection.add(c.id); });
  else selection.clear();
  updateSelectionUI();
  renderGrid();
}

function updateSelectionUI() {
  var bar = document.getElementById('batchBar');
  var count = document.getElementById('batchCount');
  count.textContent = selection.size;
  bar.classList.toggle('hidden', selection.size === 0);
  document.getElementById('selectAll').checked = selection.size === COMPONENTS.length && COMPONENTS.length > 0;
}

function clearSelection() {
  selection.clear();
  updateSelectionUI();
  renderGrid();
}

function batchDownload() {
  if (selection.size === 0) { showToast('请先选择组件', 'err'); return; }
  updateProgress(10);
  var zip = new JSZip();
  var folder = zip.folder('ui-components');
  var done = 0;
  var total = selection.size;
  COMPONENTS.forEach(function(comp) {
    if (!selection.has(comp.id)) return;
    var svg = comp.genSvg(EXPORT_W, EXPORT_H, currentVariant);
    folder.file(comp.id + '_' + currentVariant + '.svg', svg);
    done++;
    updateProgress(10 + Math.floor(done / total * 80));
  });
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'ui-components-' + currentVariant + '.zip'; a.click();
    URL.revokeObjectURL(url);
    updateProgress(100);
    setTimeout(function() { updateProgress(0); }, 500);
    showToast('批量下载完成 (' + done + '个)', 'ok');
  });
}

function filterBy(cat) {
  currentFilter = cat;
  document.querySelectorAll('.style-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.cat === cat); });
  renderGrid();
}

function filterVariant(variant) {
  currentVariant = variant;
  document.querySelectorAll('.variant-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.variant === variant); });
  renderGrid();
}

function handleSearch(q) {
  searchQuery = q.trim();
  renderGrid();
}

document.addEventListener('DOMContentLoaded', function() {
  document.fonts.ready.then(function() { fontsLoaded = true; renderGrid(); });
  setTimeout(function() { if (!fontsLoaded) renderGrid(); }, 800);
});
</script>
</body>
